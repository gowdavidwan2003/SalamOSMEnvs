<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENV Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"] { --bg-main:#f0f2f5; --bg-card:#ffffff; --bg-modal:#ffffff; --border:#e2e4e9; --text-main:#1a1d23; --text-muted:#6b7280; --hover:#f9fafb; --input-bg:#f3f4f6; --primary:#2563eb; --primary-hover:#1d4ed8; --danger:#ef4444; --success:#10b981; --glass:rgba(255,255,255,0.8); --shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06); --prod:#dc2626; --uat:#d97706; --sit:#16a34a; --dev:#2563eb; --st:#7c3aed; --mig:#0d9488; }
  :root[data-theme="dark"] { --bg-main:#0b0f19; --bg-card:rgba(30,41,59,0.5); --bg-modal:#1e293b; --border:rgba(255,255,255,0.1); --text-main:#f8fafc; --text-muted:#94a3b8; --hover:rgba(255,255,255,0.05); --input-bg:#0f172a; --primary:#3b82f6; --primary-hover:#60a5fa; --danger:#ef4444; --success:#10b981; --glass:rgba(15,23,42,0.8); --shadow:0 10px 15px -3px rgba(0,0,0,0.5),0 4px 6px -2px rgba(0,0,0,0.25); --prod:#f87171; --uat:#fbbf24; --sit:#34d399; --dev:#60a5fa; --st:#a78bfa; --mig:#2dd4bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-main); color: var(--text-main); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; transition: background-color .3s, color .3s; }
  .topbar { background: var(--glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; min-height: 60px; position: sticky; top: 0; z-index: 100; gap: 16px; flex-wrap: wrap; }
  .topbar-left, .topbar-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-family: 'IBM Plex Mono'; font-size: 16px; font-weight: 700; }
  .logo span { color: var(--primary); }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .tab:hover, .tab.active { background: var(--hover); color: var(--text-main); }
  .toolbar-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .summary-chip { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-card); font-size: 12px; color: var(--text-muted); }
  .summary-chip strong { color: var(--text-main); font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-PROD { background: var(--prod); box-shadow: 0 0 8px var(--prod); }
  .dot-UAT { background: var(--uat); box-shadow: 0 0 8px var(--uat); }
  .dot-SIT { background: var(--sit); box-shadow: 0 0 8px var(--sit); }
  .dot-ST { background: var(--st); box-shadow: 0 0 8px var(--st); }
  .dot-DEV { background: var(--dev); box-shadow: 0 0 8px var(--dev); }
  .dot-MIG { background: var(--mig); box-shadow: 0 0 8px var(--mig); }
  .search-wrap { position: relative; }
  .search { font-size: 13px; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text-main); outline: none; width: 220px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
  .btn { font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: var(--bg-card); color: var(--text-main); display: flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-icon { padding: 8px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; }
  .main { padding: 32px 24px; max-width: 1600px; margin: 0 auto; }
  .section { margin-bottom: 40px; }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .env-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
  .env-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .card-PROD .card-header { border-top: 3px solid var(--prod); }
  .card-UAT .card-header { border-top: 3px solid var(--uat); }
  .card-SIT .card-header { border-top: 3px solid var(--sit); }
  .card-ST .card-header { border-top: 3px solid var(--st); }
  .card-DEV .card-header { border-top: 3px solid var(--dev); }
  .card-MIG .card-header { border-top: 3px solid var(--mig); }
  .card-header { padding: 16px; display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-subtitle { font-family: 'IBM Plex Mono'; font-size: 11px; color: var(--text-muted); }
  .card-actions { display: flex; gap: 4px; }
  .grid-header, .grid-row { display: grid; grid-template-columns: 1fr 1fr; }
  .grid-header { border-bottom: 1px solid var(--border); }
  .col-title, .grid-cell { padding: 10px 16px; }
  .col-title:first-child, .grid-cell:first-child { border-right: 1px solid var(--border); }
  .grid-cell { display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid var(--border); }
  .detail-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  .link-row { display: flex; align-items: center; gap: 8px; }
  .link-item { color: var(--text-main); text-decoration: none; font-family: 'IBM Plex Mono'; font-size: 11px; word-break: break-all; }
  .copy-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
  .btn-log { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; width: 100%; }
  .show-more-btn { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px; font-size: 12px; font-weight: 600; color: var(--primary); cursor: pointer; }
  .more-details { display: none; background: rgba(0,0,0,0.02); }
  .more-details.open { display: block; }
  .detail-block { padding: 16px; border-bottom: 1px solid var(--border); }
  .info-val, .pre-block { font-family: 'IBM Plex Mono'; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  .pre-block { background: var(--input-bg); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-modal); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header, .modal-footer { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .modal-body { padding: 24px; overflow-y: auto; }
  .form-section { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
  .form-section-title { font-size: 13px; font-weight: 600; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 12px; color: var(--text-muted); }
  .form-input, .form-select, .form-textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .form-textarea { resize: vertical; min-height: 80px; font-family: 'IBM Plex Mono'; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: var(--bg-main); padding: 12px 20px; border-radius: 8px; transform: translateY(100px); opacity: 0; transition: all .3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 1400px) { .env-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 900px) { .env-grid, .grid-header, .grid-row, .form-row { grid-template-columns: 1fr; } .col-title:first-child, .grid-cell:first-child { border-right: none; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">ENV<span>.</span>Navigator</div>
    <div class="tabs" id="groupTabs">
      <button class="tab active" data-group="ALL">All</button>
      <button class="tab" data-group="PROD"><span class="dot dot-PROD"></span>PROD</button>
      <button class="tab" data-group="UAT"><span class="dot dot-UAT"></span>UAT</button>
      <button class="tab" data-group="SIT"><span class="dot dot-SIT"></span>SIT</button>
      <button class="tab" data-group="ST"><span class="dot dot-ST"></span>ST</button>
      <button class="tab" data-group="DEV"><span class="dot dot-DEV"></span>DEV</button>
      <button class="tab" data-group="MIG"><span class="dot dot-MIG"></span>MIG</button>
    </div>
    <div class="toolbar-meta">
      <div class="summary-chip"><span>Visible</span><strong id="visibleCount">0</strong></div>
      <div class="summary-chip"><span>Total</span><strong id="totalCount">0</strong></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" class="search" placeholder="Search environments (Ctrl+K)..."></div>
    <button class="btn-icon" id="themeToggle">🌙</button>
    <button class="btn btn-primary" id="addEnvBtn">➕ Add Environment</button>
  </div>
</div>

<div class="main" id="mainContent"><div class="empty-state">Loading environments... <span class="loader"></span></div></div>

<div class="modal-overlay" id="envModalOverlay"><div class="modal"><div class="modal-header"><div class="modal-title" id="modalTitle">Add Environment</div><button class="modal-close" id="closeModalBtn">&times;</button></div><div class="modal-body"><form id="editForm"><input type="hidden" id="envId"><div class="form-section"><div class="form-section-title">Basic Info</div><div class="form-row"><div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="envName" required></div><div class="form-group"><label class="form-label">Group *</label><select class="form-select" id="envGroup" required><option value="">Select...</option><option value="PROD">PROD</option><option value="UAT">UAT</option><option value="SIT">SIT</option><option value="ST">ST</option><option value="MIG">MIG</option><option value="DEV">DEV</option></select></div></div><div class="form-row"><div class="form-group"><label class="form-label">Dev Alias</label><input class="form-input" id="envDevName"></div><div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="envNotes"></div></div></div><div class="form-section"><div class="form-section-title">URLs</div><div class="form-row"><div class="form-group"><label class="form-label">COM Weblogic Console</label><input class="form-input" id="comConsoleUrl"></div><div class="form-group"><label class="form-label">SOM Weblogic Console</label><input class="form-input" id="somConsoleUrl"></div></div><div class="form-row"><div class="form-group"><label class="form-label">COM Order Management</label><input class="form-input" id="comOrderMgmtUrl"></div><div class="form-group"><label class="form-label">SOM Order Management</label><input class="form-input" id="somOrderMgmtUrl"></div></div><div class="form-row"><div class="form-group"><label class="form-label">COM Orchestration</label><input class="form-input" id="comOrchUrl"></div><div class="form-group"><label class="form-label">SOM Orchestration</label><input class="form-input" id="somOrchUrl"></div></div></div><div class="form-section"><div class="form-section-title">SSH / Logs</div><div class="form-row"><div class="form-group"><label class="form-label">SSH Server Host</label><input class="form-input" id="serverHost"></div><div class="form-group"><label class="form-label">SSH Username</label><input class="form-input" id="serverUser"></div></div><div class="form-row"><div class="form-group full"><label class="form-label">SSH Password</label><input type="password" class="form-input" id="serverPass"></div></div><div class="form-row"><div class="form-group full"><label class="form-label">COM Log Command</label><textarea class="form-textarea" id="comLogCmd"></textarea></div><div class="form-group full"><label class="form-label">SOM Log Command</label><textarea class="form-textarea" id="somLogCmd"></textarea></div></div></div><div class="form-section"><div class="form-section-title">Database Details</div><div class="form-row"><div class="form-group full"><label class="form-label">COM DB Info</label><textarea class="form-textarea" id="comDbInfo"></textarea></div><div class="form-group full"><label class="form-label">SOM DB Info</label><textarea class="form-textarea" id="somDbInfo"></textarea></div></div></div><div class="form-section"><div class="form-section-title">Other Config</div><div class="form-row"><div class="form-group full"><label class="form-label">Host File Entries</label><textarea class="form-textarea" id="hostEntries"></textarea></div><div class="form-group full"><label class="form-label">Other Information</label><textarea class="form-textarea" id="otherInfo"></textarea></div></div></div></form></div><div class="modal-footer"><button class="btn" id="cancelModalBtn">Cancel</button><button class="btn btn-primary" id="saveEnvBtn">Save Environment</button></div></div></div>

<div id="toast" class="toast">Action successful</div>

<script>
let envs = [];
let currentFilter = 'ALL';
let searchQuery = '';

const mainContent = document.getElementById('mainContent');
const groupTabsContainer = document.getElementById('groupTabs');
const searchInput = document.getElementById('searchInput');
const themeToggle = document.getElementById('themeToggle');
const toastEl = document.getElementById('toast');
const visibleCountEl = document.getElementById('visibleCount');
const totalCountEl = document.getElementById('totalCount');
const modalOverlay = document.getElementById('envModalOverlay');
const addEnvBtn = document.getElementById('addEnvBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const cancelModalBtn = document.getElementById('cancelModalBtn');
const saveEnvBtn = document.getElementById('saveEnvBtn');
const editForm = document.getElementById('editForm');
const modalTitle = document.getElementById('modalTitle');

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function loadTheme() {
  const saved = localStorage.getItem('env_nav_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  themeToggle.textContent = saved === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('env_nav_theme', next);
  themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}

async function fetchData() {
  try {
    const res = await fetch('/api/environments');
    if (!res.ok) throw new Error('Failed to fetch data');
    envs = await res.json();
    renderCards();
  } catch (err) {
    console.error(err);
    if (envs.length === 0) {
      mainContent.innerHTML = '<div class="empty-state" style="color:var(--danger)">Error loading data. Is the backend running?</div>';
    }
  }
}

function makeLink(url) {
  if (!url) return '<span>-</span>';
  return `<div class="link-row"><a href="${url}" target="_blank" class="link-item">${escapeHtml(url)}</a><button class="copy-btn" onclick="copyText(this.previousElementSibling)">📋</button></div>`;
}

function generateCardHTML(env) {
  const com = env.com_data || {};
  const som = env.som_data || {};
  const hasServer = !!env.server_host;
  return `<div class="env-card card-${env.group_name}">
    <div class="card-header">
      <div class="card-title-wrap">
        <div class="card-title">${escapeHtml(env.name)} ${env.dev_name ? `(${escapeHtml(env.dev_name)})` : ''}</div>
        <div class="card-subtitle">${escapeHtml(env.notes || 'No notes')}</div>
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="editEnv('${env.id}')">✎</button>
        <button class="btn-icon" onclick="deleteEnv('${env.id}')">🗑️</button>
      </div>
    </div>
    <div class="card-body">
      <div class="grid-header"><div class="col-title">COM</div><div class="col-title">SOM</div></div>
      <div class="grid-row"><div class="grid-cell"><div class="detail-title">COM Weblogic</div>${makeLink(com.consoleUrl)}</div><div class="grid-cell"><div class="detail-title">SOM Weblogic</div>${makeLink(som.consoleUrl)}</div></div>
      <div class="grid-row"><div class="grid-cell"><div class="detail-title">COM Order Management</div>${makeLink(com.orderMgmtUrl)}</div><div class="grid-cell"><div class="detail-title">SOM Order Management</div>${makeLink(som.orderMgmtUrl)}</div></div>
      <div class="grid-row"><div class="grid-cell"><div class="detail-title">COM Orchestration</div>${makeLink(com.orchestrationUrl)}</div><div class="grid-cell"><div class="detail-title">SOM Orchestration</div>${makeLink(som.orchestrationUrl)}</div></div>
      <div class="grid-row"><div class="grid-cell"><button class="btn-log" ${!hasServer || !com.logCommand ? 'disabled' : `onclick="downloadBat('${env.id}','COM')"`}>📥 COM Logs</button></div><div class="grid-cell"><button class="btn-log" ${!hasServer || !som.logCommand ? 'disabled' : `onclick="downloadBat('${env.id}','SOM')"`}>📥 SOM Logs</button></div></div>
    </div>
    <button class="show-more-btn" onclick="toggleDetails('${env.id}')">Show More Details ▾</button>
    <div class="more-details" id="details-${env.id}">
      <div class="grid-row"><div class="grid-cell"><div class="detail-title">COM DB</div><div class="info-val">${escapeHtml(com.dbInfo || 'Not configured')}</div></div><div class="grid-cell"><div class="detail-title">SOM DB</div><div class="info-val">${escapeHtml(som.dbInfo || 'Not configured')}</div></div></div>
      ${env.host_entries ? `<div class="detail-block"><div class="detail-title">Host File Entries</div><div class="pre-block" onclick="copyText(this)">${escapeHtml(env.host_entries)}</div></div>` : ''}
      ${env.other_info ? `<div class="detail-block"><div class="detail-title">Other Information</div><div class="pre-block">${escapeHtml(env.other_info)}</div></div>` : ''}
    </div>
  </div>`;
}

function renderCards() {
  mainContent.innerHTML = '';
  const filtered = envs.filter((env) => {
    const groupMatch = currentFilter === 'ALL' || env.group_name === currentFilter;
    const searchStr = (env.name + ' ' + (env.dev_name || '') + ' ' + (env.notes || '')).toLowerCase();
    return groupMatch && searchStr.includes(searchQuery.toLowerCase());
  });

  visibleCountEl.textContent = filtered.length;
  totalCountEl.textContent = envs.length;

  if (!filtered.length) {
    mainContent.innerHTML = '<div class="empty-state">No environments found matching your criteria.</div>';
    return;
  }

  ['PROD', 'UAT', 'SIT', 'ST', 'MIG', 'DEV'].forEach((groupName) => {
    const groupEnvs = filtered.filter((env) => env.group_name === groupName);
    if (!groupEnvs.length) return;
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-head"><span class="dot dot-${groupName}"></span><span class="section-title">${groupName} (${groupEnvs.length})</span><div class="section-line"></div></div><div class="env-grid">${groupEnvs.map(generateCardHTML).join('')}</div>`;
    mainContent.appendChild(section);
  });
}

function toggleDetails(id) {
  const el = document.getElementById(`details-${id}`);
  const btn = el.previousElementSibling;
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    btn.innerHTML = 'Show More Details ▾';
  } else {
    el.classList.add('open');
    btn.innerHTML = 'Hide Details ▴';
  }
}

function openModal(env = null) {
  editForm.reset();
  if (env) {
    modalTitle.textContent = 'Edit Environment';
    envId.value = env.id;
    envName.value = env.name;
    envGroup.value = env.group_name;
    envDevName.value = env.dev_name || '';
    envNotes.value = env.notes || '';
    serverHost.value = env.server_host || '';
    serverUser.value = env.server_user || '';
    serverPass.value = env.server_password || '';
    const com = env.com_data || {};
    const som = env.som_data || {};
    comConsoleUrl.value = com.consoleUrl || '';
    somConsoleUrl.value = som.consoleUrl || '';
    comOrderMgmtUrl.value = com.orderMgmtUrl || '';
    somOrderMgmtUrl.value = som.orderMgmtUrl || '';
    comOrchUrl.value = com.orchestrationUrl || '';
    somOrchUrl.value = som.orchestrationUrl || '';
    comLogCmd.value = com.logCommand || '';
    somLogCmd.value = som.logCommand || '';
    comDbInfo.value = com.dbInfo || '';
    somDbInfo.value = som.dbInfo || '';
    hostEntries.value = env.host_entries || '';
    otherInfo.value = env.other_info || '';
  } else {
    modalTitle.textContent = 'Add Environment';
    envId.value = '';
  }
  modalOverlay.classList.add('open');
}

function closeModal() { modalOverlay.classList.remove('open'); }
function editEnv(id) { const env = envs.find((entry) => entry.id === id); if (env) openModal(env); }

async function saveEnvironment(event) {
  event.preventDefault();
  if (!editForm.checkValidity()) {
    editForm.reportValidity();
    return;
  }

  const id = envId.value;
  const isUpdate = !!id;
  saveEnvBtn.disabled = true;
  saveEnvBtn.textContent = 'Saving...';

  const payload = {
    name: envName.value,
    group_name: envGroup.value,
    dev_name: envDevName.value,
    notes: envNotes.value,
    server_host: serverHost.value,
    server_user: serverUser.value,
    server_password: serverPass.value,
    com_data: {
      consoleUrl: comConsoleUrl.value,
      orderMgmtUrl: comOrderMgmtUrl.value,
      orchestrationUrl: comOrchUrl.value,
      logCommand: comLogCmd.value,
      dbInfo: comDbInfo.value
    },
    som_data: {
      consoleUrl: somConsoleUrl.value,
      orderMgmtUrl: somOrderMgmtUrl.value,
      orchestrationUrl: somOrchUrl.value,
      logCommand: somLogCmd.value,
      dbInfo: somDbInfo.value
    },
    host_entries: hostEntries.value,
    other_info: otherInfo.value
  };

  try {
    const url = isUpdate
      ? `/api/environments/${id}?id=${encodeURIComponent(id)}`
      : '/api/environments';

    const res = await fetch(url, {
      method: isUpdate ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error('Failed to save');
    await fetchData();
    closeModal();
    showToast('Environment saved successfully');
  } catch (err) {
    console.error(err);
    alert('Error saving environment: ' + err.message);
  } finally {
    saveEnvBtn.disabled = false;
    saveEnvBtn.textContent = 'Save Environment';
  }
}

async function deleteEnv(id) {
  if (!confirm('Are you sure you want to delete this environment?')) return;
  try {
    const res = await fetch(`/api/environments/${id}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed to delete');
    await fetchData();
    showToast('Environment deleted');
  } catch (err) {
    alert('Failed to delete: ' + err.message);
  }
}

async function copyText(node) {
  const text = node.textContent;
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard');
  } catch (err) {
    console.warn('Copy failed', err);
  }
}

function downloadBat(envId, type) {
  const env = envs.find((entry) => entry.id === envId);
  if (!env) return;

  const data = type === 'COM' ? env.com_data : env.som_data;
  const cmd = data?.logCommand;
  if (!cmd) {
    alert('Missing Log Command for this component.');
    return;
  }

  const trimmedCmd = String(cmd).trim();
  const batContent = trimmedCmd.startsWith('@echo off') ? trimmedCmd : `@echo off\n${trimmedCmd}\n`;

  const blob = new Blob([batContent], { type: 'application/bat' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = url;
  a.download = `logs_${env.name.replace(/[^a-zA-Z0-9]/g, '_')}_${type}.bat`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(url);
  a.remove();
}

function setupEventListeners() {
  themeToggle.addEventListener('click', toggleTheme);
  groupTabsContainer.addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.group;
    renderCards();
  });

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderCards();
  });

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape') closeModal();
  });

  addEnvBtn.addEventListener('click', () => openModal());
  closeModalBtn.addEventListener('click', closeModal);
  cancelModalBtn.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  saveEnvBtn.addEventListener('click', saveEnvironment);
}

loadTheme();
setupEventListeners();
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
